name: build iso

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RELEASE_TAG: nightly

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --privileged
    steps:
      - name: install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso base-devel go git sudo fakeroot

      - name: setup build user
        run: |
          useradd -m mochi
          echo "mochi ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p /home/mochi/.mochios-gnupg
          chown -R mochi:mochi /home/mochi

      - name: clone repo
        run: |
          cd /tmp
          git clone https://github.com/iluxz/MochiOS.git mochios
          chown -R mochi:mochi /tmp/mochios

      - name: create signing key
        run: |
          mkdir -p /home/mochi/.mochios-gnupg /tmp/mochios/repo/pubkey
          chown -R mochi:mochi /home/mochi/.mochios-gnupg
          cd /tmp/mochios
          printf 'Key-Type: RSA\nKey-Length: 2048\nName-Real: MochiOS CI\nName-Email: ci@mochios.dev\nExpire-Date: 0\n%%no-protection\n' | gpg --homedir /home/mochi/.mochios-gnupg --batch --gen-key 2>&1
          gpg --homedir /home/mochi/.mochios-gnupg --export --armor ci@mochios.dev > repo/pubkey/mochios-key.pub
          chmod 644 /home/mochi/.mochios-gnupg/pubring.kbx /home/mochi/.mochios-gnupg/trustdb.gpg 2>/dev/null || true

      - name: create secure boot keys
        run: |
          mkdir -p /tmp/mochios/secure-boot
          cd /tmp/mochios/secure-boot
          openssl req -x509 -newkey rsa:2048 -keyout db.key -out db.crt \
            -days 365 -nodes -subj "/CN=MochiOS CI/"
          chmod 600 db.key

      - name: build packages + iso
        run: |
          mkdir -p /tmp/mochios-work /tmp/mochios/out
          MOCHIOS_DIR=/tmp/mochios \
          WORK_DIR=/tmp/mochios-work \
          GNUPGHOME=/home/mochi/.mochios-gnupg \
          SIGN_KEY=ci@mochios.dev \
          bash /tmp/mochios/build.sh 2>&1

      - name: upload iso
        uses: actions/upload-artifact@v7
        with:
          name: mochios-iso
          path: /tmp/mochios/out/*.iso
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v7
        with:
          name: mochios-iso
          path: /tmp/iso

      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd /tmp/iso
          iso=$(ls *.iso 2>/dev/null | head -1)
          if [ -z "$iso" ]; then echo "no iso found"; exit 1; fi
          gh release view "$RELEASE_TAG" --json url &>/dev/null && \
            gh release upload "$RELEASE_TAG" "$iso" --clobber || \
            gh release create "$RELEASE_TAG" "$iso" --title "MochiOS Nightly" --notes "auto-built from main" --prerelease
