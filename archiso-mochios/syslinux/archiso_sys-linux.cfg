LABEL arch
TEXT HELP
Boot the mochios install medium on BIOS.
It allows you to install mochios or perform system maintenance.
ENDTEXT
MENU LABEL mochios install medium (x86_64, BIOS)
LINUX /mochi/boot/x86_64/vmlinuz-linux
INITRD /mochi/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=mochi archisosearchuuid=%ARCHISO_UUID% loglevel=4 systemd.show_status=false

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the mochios install medium on BIOS with speakup screen reader.
It allows you to install mochios or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL mochios install medium (x86_64, BIOS) with ^speech
LINUX /mochi/boot/x86_64/vmlinuz-linux
INITRD /mochi/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=mochi archisosearchuuid=%ARCHISO_UUID% accessibility=on loglevel=4 systemd.show_status=false
