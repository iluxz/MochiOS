LABEL arch
TEXT HELP
Boot the mochios install medium over PXE on BIOS.
It allows you to install mochios or perform system maintenance.
ENDTEXT
MENU LABEL mochios install medium (x86_64, BIOS) over PXE
LINUX /mochi/boot/x86_64/vmlinuz-linux
INITRD /mochi/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=mochi archisosearchuuid=%ARCHISO_UUID% quiet loglevel=3 systemd.show_status=false

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the mochios install medium over PXE on BIOS with speakup screen reader.
It allows you to install mochios or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL mochios install medium (x86_64, BIOS) over PXE with ^speech
LINUX /mochi/boot/x86_64/vmlinuz-linux
INITRD /mochi/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=mochi archisosearchuuid=%ARCHISO_UUID% accessibility=on quiet loglevel=3 systemd.show_status=false
