# mochiboot configuration — Nightly edition
# purple-themed for the nightly build flex

TIMEOUT=5
VERBOSE=no
GRAPHICS=yes

# night mode: purple
INTERFACE_BRANDING=MochiBoot Nightly
INTERFACE_BRANDING_COLOUR=825cdc

# boot counter: auto-select this entry after 3 consecutive failed boots
MOCHIBOOT_RECOVERY_ENTRY=MOCHIOS (recovery mode)

:DEFAULT
    PROTOCOL=linux
    KERNEL_PATH=boot:///vmlinuz-linux
    CMDLINE=root=UUID=%ROOT_UUID% rw loglevel=4

:MOCHIOS (recovery mode)
    PROTOCOL=linux
    KERNEL_PATH=boot:///vmlinuz-linux
    CMDLINE=root=UUID=%ROOT_UUID% rw loglevel=4 mochi.recovery

:FALLBACK
    PROTOCOL=linux
    KERNEL_PATH=boot:///vmlinuz-linux
    CMDLINE=root=UUID=%ROOT_UUID% rw loglevel=4
